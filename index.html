<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>RPG | Тропы забытого королевства</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #0a0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 12px; min-height: 100vh; color: #fff; }
        .game-container { max-width: 550px; margin: 0 auto; background: #0f0e17; border-radius: 28px; padding: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid #f7d44a55; }
        @keyframes runAnim { 0% { transform: translateX(0); } 50% { transform: translateX(6px); } 100% { transform: translateX(0); } }
        @keyframes idleAnim { 0% { transform: translateY(0); } 50% { transform: translateY(-3px); } 100% { transform: translateY(0); } }
        @keyframes attackAnim { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes dodgeAnim { 0% { transform: translateX(0); } 50% { transform: translateX(-10px); } 100% { transform: translateX(0); } }
        .char-running { animation: runAnim 0.25s infinite; display: inline-block; font-size: 3rem; filter: drop-shadow(0 0 6px gold); }
        .char-idle { animation: idleAnim 1s infinite; display: inline-block; font-size: 2.8rem; }
        .char-attack { animation: attackAnim 0.2s; display: inline-block; font-size: 3rem; }
        .char-dodge { animation: dodgeAnim 0.2s; display: inline-block; font-size: 2.8rem; }
        .stats-panel { background: #1e1b2b; border-radius: 20px; padding: 10px; margin-bottom: 12px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 6px; }
        .stat { background: #00000099; padding: 6px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: bold; color: #f7d44a; }
        .energy-bar { background: #2a1a2a; border-radius: 20px; height: 8px; margin-top: 5px; overflow: hidden; }
        .energy-fill { background: #4cff4c; height: 100%; width: 0%; transition: width 0.2s; }
        .energy-fill.travel { background: #ffaa44; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: #2a2438; padding: 8px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; cursor: pointer; color: #fff; }
        .tab-btn.active { background: #f7d44a; color: #1e1b2b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .location-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; margin: 12px 0; max-height: 260px; overflow-y: auto; }
        .location-btn { background: #3a2c45; padding: 8px 4px; border-radius: 30px; font-size: 0.6rem; text-align: center; cursor: pointer; color: white; }
        .location-btn.locked { opacity: 0.5; cursor: not-allowed; background: #5a3e2e; }
        .location-btn.completed { background: #2a6b4a; border: 1px solid gold; }
        .admin-panel { background: #2c1e2e; border-radius: 20px; padding: 12px; margin-top: 15px; border: 2px solid #ff00ff; display: none; max-height: 400px; overflow-y: auto; }
        .admin-panel.show { display: block; }
        .admin-input, .admin-select { background: #1e1b2b; color: #f7d44a; border: 1px solid gold; border-radius: 30px; padding: 6px 10px; margin: 5px; width: 45%; }
        .npc-panel, .craft-panel { background: #1a3a2a; border-radius: 20px; padding: 12px; margin-top: 10px; }
        .message-log { background: #000000aa; border-radius: 16px; padding: 8px; margin-top: 12px; font-size: 0.7rem; color: #bdaa88; max-height: 90px; overflow-y: auto; }
        .character-form { text-align: center; padding: 20px; }
        .character-form input, .character-form select { display: block; margin: 15px auto; padding: 12px; width: 85%; background: #1e1b2b; color: #f7d44a; border: 1px solid #f7d44a; border-radius: 40px; font-size: 1rem; text-align: center; }
        .sprite-area { text-align: center; font-size: 3rem; background: #00000055; border-radius: 50px; padding: 12px; margin-bottom: 12px; }
        button { background: #3a2c45; border: none; padding: 8px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: bold; color: white; cursor: pointer; margin: 4px; }
        button:active { transform: scale(0.96); }
        .reset-btn { background: #5a3e2e; }
        .run-btn { background: #2f6b4a; }
        .boss-btn { background: #8b3c2c; font-weight: bold; }
        .autofight-btn { background: #2f6b4a; }
        .autofight-btn.active { background: #00aa44; }
        .fight-counter { background: #1a1530; border-radius: 20px; padding: 8px; text-align: center; margin: 10px 0; font-size: 0.8rem; }
        .class-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; max-height: 300px; overflow-y: auto; }
        .class-option { background: #2a2438; padding: 8px; border-radius: 16px; text-align: center; cursor: pointer; border: 1px solid #f7d44a55; font-size: 0.7rem; }
        .class-option.selected { background: #f7d44a; color: #1e1b2b; border: 2px solid gold; }
        .resource-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .resource-badge { background: #1e1b2b; padding: 4px 8px; border-radius: 20px; font-size: 0.55rem; }
        .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; max-height: 300px; overflow-y: auto; padding: 8px; background: #16122a; border-radius: 20px; }
        .item-card { background: #2a2438; padding: 6px; border-radius: 12px; text-align: center; font-size: 0.6rem; cursor: pointer; }
        .equipment-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        .equip-item { background: #2a2438; padding: 8px; border-radius: 12px; text-align: center; font-size: 0.65rem; }
        .rarity-badge { font-size: 0.5rem; padding: 2px 6px; border-radius: 12px; display: inline-block; margin-left: 5px; }
        .rarity-common { background: #666; color: white; }
        .rarity-rare { background: #3388ff; color: white; }
        .rarity-epic { background: #aa44ff; color: white; }
        .rarity-legendary { background: #ffaa00; color: #1e1b2b; }
        .rarity-mythic { background: #ff44ff; color: #1e1b2b; }
        .rarity-divine { background: #00ffaa; color: #1e1b2b; }
        hr { border-color: #f7d44a55; margin: 10px 0; }
        .section-title { color: #f7d44a; font-size: 0.8rem; margin: 8px 0 4px 0; }
        .exit-dungeon-btn { background: #ff6600; margin-top: 10px; }
    </style>
</head>

    async function loadGame(id) {
        const raw = await loadData(`rpg_${id}`);
        if(raw) {
            let data = JSON.parse(raw);

            game.isAdmin = isAdmin();
            if(!game.completedLocations) game.completedLocations = [];
            if(!game.inventory) game.inventory = [];

            if(!game.potions) game.potions = { weak: 3, medium: 1, strong: 0 };
            game.message = `С возвращением, ${game.profileName}!`;
            renderGame();
            return true;
        }
        return false;

    async function createCharacter(name, className) {
        if(!name.trim()) { alert("Введите имя!"); return false; }
        const cls = CLASSES[className];
        game.profileName = name; game.class = className; game.telegramId = getTelegramId();
        game.gold = 500; game.level = 1; game.exp = 0; game.expToNext = 100;
        game.combatEnergy = 100 + (cls.hpBonus||0); game.maxCombatEnergy = 100 + (cls.hpBonus||0);
        game.travelEnergy = 50; game.maxTravelEnergy = 50; game.monstersKilled = 0;
        game.weapon = { name: cls.weapon, type: "weapon", strBonus: cls.strBonus };
        game.armor = { name: "Кожаная броня", type: "armor", defBonus: 2 };
        game.inventory = [game.weapon, game.armor];
        game.location = "village"; game.dungeonFloor = 1; game.maxUnlockedFloor = 1;
        game.completedLocations = []; game.isAdmin = isAdmin();
        game.message = `✨ Добро пожаловать, ${name}-${cls.name}! ✨\n🏆 Победите 15 монстров, чтобы открыть босса!`;
        game.initialized = true;
        await saveGame();
        renderGame();
        return true;
    }
    
    function getTotalStrength() { return game.weapon?.strBonus || 2; }
    function getTotalDefense() { return game.armor?.defBonus || 0; }
    function getCurrentStats() {
        const cls = CLASSES[game.class] || CLASSES.warrior;
        return { hp: game.combatEnergy, maxHp: game.maxCombatEnergy,
                 str: 10 + game.level * 2 + getTotalStrength() + (cls.strBonus||0),
                 def: 5 + game.level + getTotalDefense() + (cls.defBonus||0) };
    }
    
    function canAccessLocation(locKey) {
        if(game.isAdmin) return true;
        const loc = LOCATIONS[locKey];
        if(!loc) return false;
        if(game.level < loc.levelReq) return false;
        if(loc.isDungeon) return true;
        if(locKey === "village") return true;
        return true;
    }
    
    function getRandomEnemy() {
        const list = Object.values(ENEMIES);
        let e = { ...list[Math.floor(Math.random() * list.length)] };
        let bonus = Math.floor(game.level / 2);
        e.hp += bonus * 5; e.str += bonus * 2; e.exp += bonus * 8; e.gold += bonus * 5;
        if(game.completedLocations.includes(game.location) && game.location !== "dungeonLoc") {
            e.hp *= 1.5; e.str *= 1.5; e.exp *= 1.3; e.gold *= 1.3;
        }
        return e;
    }
    
    function getBoss(locKey) {
        const loc = LOCATIONS[locKey];
        if(!loc || !loc.boss) return null;
        let b = { ...loc.boss };
        let bonus = Math.floor(game.level / 2);
        b.hp += bonus * 10; b.str += bonus * 3; b.exp += bonus * 20; b.gold += bonus * 30;
        b.isBoss = true;
        return b;
    }
    
    async function gainExp(amount) {
        game.exp += amount;
        game.message += ` +${amount}✨`;
        while(game.exp >= game.expToNext) {
            game.exp -= game.expToNext; game.level++;
            game.maxCombatEnergy += 5; game.maxTravelEnergy += 2;
            game.combatEnergy = game.maxCombatEnergy; game.travelEnergy = game.maxTravelEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` ✨ УРОВЕНЬ ${game.level}! ✨`;
            await saveGame();
        }
        renderGame();
    }
    
    async function dropResources(isDungeon, floor, isBoss) {
        let drops = [];
        let rand = Math.random() * 100;
        if(isDungeon) {
            if(floor >= 100 && floor <= 299 && rand < 20) { drops.push("Искра богов"); }
            if(floor >= 300 && rand < 30) { drops.push("Великая эссенция"); }
            if(floor >= 300 && isBoss && rand < 20) { drops.push("Сердце демона"); }
            if(rand < 30) {
                let r = ["Целебная трава", "Магический гриб", "Медная руда"][Math.floor(Math.random()*3)];
                drops.push(r);
            }
        }
        if(drops.length > 0) {
            game.message += ` + 📦 ${drops.join(", ")}`;
            if(!game.resources) game.resources = {};
            drops.forEach(d => { game.resources[d] = (game.resources[d] || 0) + 1; });
        }
        await saveGame();
    }
    
    async function exitDungeon() {
        if(game.location === "dungeonLoc") {
            game.location = "village";
            game.message = "🚪 Вы вышли из подземелья и вернулись в деревню";
            renderGame();
            await saveGame();
        }
    }
    
    async function combatAction(action) {
        if(!game.inCombat) return;
        let enemy = game.combatEnemy;
        let stats = getCurrentStats();
        
        if(game.enemyCurrentHp <= 0) {
            game.gold += enemy.gold;
            await gainExp(enemy.exp);
            await dropResources(game.location === "dungeonLoc", game.dungeonFloor, enemy.isBoss);
            if(!enemy.isBoss) {
                game.monstersKilled++;
                if(game.location === "dungeonLoc") game.monstersKilled = 0;
            }
            if(!game.infiniteCombatEnergy) game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + (enemy.isBoss ? 15 : 8));
            game.message = `🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨`;
            if(enemy.isBoss) {
                if(!game.completedLocations.includes(game.location) && game.location !== "dungeonLoc") {
                    game.completedLocations.push(game.location);
                    game.message += ` 🎉 Локация пройдена! 🎉`;
                }
                if(game.location === "dungeonLoc") {
                    game.dungeonFloor++;
                    if(game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
                    game.message += ` 📈 Поднялись на ${game.dungeonFloor} этаж!`;
                }
                game.monstersKilled = 0;
            }
            game.inCombat = false; game.combatEnemy = null;
            await saveGame();
            if(game.autoFightActive && !enemy.isBoss && game.monstersKilled < game.needToKill && !game.completedLocations.includes(game.location)) {
                setTimeout(() => startRandomFight(), 200);
            } else { renderGame(); }
            return;
        }
        if(stats.hp <= 0) {
            if(!game.infiniteCombatEnergy) game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 3);
            game.message = `💀 Поражение... Возвращено 3⚡`;
            game.inCombat = false; game.combatEnemy = null;
            if(game.autoFightActive) game.autoFightActive = false;
            await saveGame(); renderGame();
            return;
        }
        if(action === "attack") {
            let dmg = Math.max(1, stats.str + Math.floor(Math.random() * 8) - 5);
            game.enemyCurrentHp -= dmg;
            game.message = `⚡ Урон ${dmg} по ${enemy.name}`;
            let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
            if(!game.infiniteCombatEnergy) game.combatEnergy -= enemyDmg;
            if(game.combatEnergy < 0) game.combatEnergy = 0;
            game.message += ` | Враг атакует → -${enemyDmg} HP`;
            await saveGame(); renderGame();
            return;
        }
    }
    
    function startRandomFight() {
        if(game.completedLocations.includes(game.location) && game.location !== "dungeonLoc") { game.message = "Босс уже побеждён!"; renderGame(); return; }
        if(game.monstersKilled >= game.needToKill && game.location !== "dungeonLoc") { game.message = "👑 Убей босса!"; renderGame(); return; }
        if(game.combatEnergy < 10 && !game.infiniteCombatEnergy) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        if(!game.infiniteCombatEnergy) game.combatEnergy -= 10;
        let enemy = getRandomEnemy();
        game.inCombat = true; game.combatEnemy = enemy; game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ БОЙ ${game.monstersKilled+1}/${game.needToKill}: ${enemy.icon} ${enemy.name}`;
        renderGame();
    }
    
    function startBossFight() {
        if(game.completedLocations.includes(game.location)) { game.message = "Босс уже побеждён!"; renderGame(); return; }
        if(game.monstersKilled < game.needToKill) { game.message = `❌ Нужно ещё ${game.needToKill-game.monstersKilled} побед!`; renderGame(); return; }
        if(game.combatEnergy < 15 && !game.infiniteCombatEnergy) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        if(!game.infiniteCombatEnergy) game.combatEnergy -= 15;
        let boss = getBoss(game.location);
        game.inCombat = true; game.combatEnemy = boss; game.enemyCurrentHp = boss.hp;
        game.message = `⚔️ БОЙ С БОССОМ: ${boss.icon} ${boss.name}`;
        renderGame();
    }
    
    function startDungeonFight() {
        if(game.combatEnergy < 10 && !game.infiniteCombatEnergy) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        if(!game.infiniteCombatEnergy) game.combatEnergy -= 10;
        let isBoss = (game.dungeonFloor % 20 === 0);
        let enemy = isBoss ? 
            { name: `👑 БОСС ${game.dungeonFloor}эт 👑`, hp: 100+game.dungeonFloor*2, str: 25+Math.floor(game.dungeonFloor/2), exp: 200+game.dungeonFloor*5, gold: 150+game.dungeonFloor*8, icon: "👑", isBoss: true } :
            { name: `Страж ${game.dungeonFloor}эт`, hp: 40+game.dungeonFloor, str: 12+Math.floor(game.dungeonFloor/4), exp: 50+game.dungeonFloor, gold: 30+game.dungeonFloor*2, icon: "👹" };
        game.inCombat = true; game.combatEnemy = enemy; game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ ПОДЗЕМЕЛЬЕ ${game.dungeonFloor}эт: ${enemy.icon} ${enemy.name}`;
        renderGame();
    }
    
    function startAutoFight() {
        if(game.autoFightActive) { 
            if(game.autoFightInterval) clearInterval(game.autoFightInterval); 
            game.autoFightActive = false; 
            renderGame(); 
            return; 
        }
        game.autoFightActive = true;
        game.message = "🟢 АВТОБОЙ ВКЛЮЧЁН";
        renderGame();
        game.autoFightInterval = setInterval(() => {
            if(game.autoFightActive && !game.inCombat && !game.completedLocations.includes(game.location) && game.monstersKilled < game.needToKill && (game.combatEnergy >= 10 || game.infiniteCombatEnergy)) {
                startRandomFight();
            }
        }, 1000);
    }
    
    function changeLocation(locKey) {
        if(!canAccessLocation(locKey)) { game.message = "❌ Недоступно!"; renderGame(); return; }
        let loc = LOCATIONS[locKey];
        let energyCost = loc.energyCost || 5;
        if(game.travelEnergy >= energyCost || game.isAdmin || game.infiniteTravelEnergy) {
            if(!game.isAdmin && !game.infiniteTravelEnergy) game.travelEnergy -= energyCost;
            game.location = locKey;
            if(!loc.isDungeon) {
                game.monstersKilled = 0;
                if(game.completedLocations.includes(locKey)) game.monstersKilled = game.needToKill;
            } else {
                game.monstersKilled = 0;
            }
            game.message = `🚶 Переход в ${loc.name}`;
            renderGame();
        } else { game.message = `❌ Недостаточно энергии! Нужно ${energyCost}⚡`; renderGame(); }
    }
    
    function goToFloor(floor) {
        floor = Math.min(1000, Math.max(1, floor));
        if(game.isAdmin || floor <= game.maxUnlockedFloor + 10) {
            game.dungeonFloor = floor;
            if(floor > game.maxUnlockedFloor) game.maxUnlockedFloor = floor;
            game.message = `📍 Переход на ${floor} этаж`;
            renderGame();
        } else { game.message = `❌ Нельзя перейти! Максимум ${game.maxUnlockedFloor + 10} этаж`; renderGame(); }
    }
    
    function getRarityBadge(rarity) {
        let names = { common: "Обычное", rare: "Редкое", epic: "Эпическое", legendary: "Легендарное", mythic: "Мифическое", divine: "Божественное" };
        return `<span class="rarity-badge rarity-${rarity}">${names[rarity] || rarity}</span>`;
    }
    
    async function equipItem(item) {
        if(item.type === "weapon") game.weapon = item;
        else if(item.type === "armor") game.armor = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        await saveGame(); renderGame();
    }
    
    async function usePotion(type) {
        if(type === "weak" && game.potions.weak > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 10); game.potions.weak--; game.message = "🍃 +10 HP"; }
        else if(type === "medium" && game.potions.medium > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 25); game.potions.medium--; game.message = "🧪 +25 HP"; }
        else if(type === "strong" && game.potions.strong > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 50); game.potions.strong--; game.message = "💊 +50 HP"; }
        else { game.message = "❌ Нет зелий!"; }
        await saveGame(); renderGame();
    }
    
    async function adminGiveGold() { if(!game.isAdmin) return; let nick = document.getElementById("aNick")?.value; let amt = parseInt(document.getElementById("aGold")?.value); if(!nick) return; let data = await loadData(`rpg_${nick}`); if(data) { let t = JSON.parse(data); t.gold = (t.gold||0)+amt; await saveData(`rpg_${nick}`, JSON.stringify(t)); game.message = `👑 Выдал ${amt}💰 ${nick}`; renderGame(); } else game.message = `❌ Игрок ${nick} не найден`; renderGame(); }
    async function adminGiveExp() { if(!game.isAdmin) return; let nick = document.getElementById("aNick")?.value; let amt = parseInt(document.getElementById("aExp")?.value); if(!nick) return; let data = await loadData(`rpg_${nick}`); if(data) { let t = JSON.parse(data); t.exp = (t.exp||0)+amt; await saveData(`rpg_${nick}`, JSON.stringify(t)); game.message = `👑 Выдал ${amt}✨ ${nick}`; renderGame(); } else game.message = `❌ Игрок ${nick} не найден`; renderGame(); }
    async function adminGiveItem() { if(!game.isAdmin) return; let nick = document.getElementById("aItemNick")?.value; let itemName = document.getElementById("aItemSelect")?.value; if(!nick) return; let item = ALL_ITEMS.find(i => i.name === itemName); if(!item) return; let data = await loadData(`rpg_${nick}`); if(data) { let t = JSON.parse(data); if(!t.inventory) t.inventory = []; t.inventory.push({...item}); await saveData(`rpg_${nick}`, JSON.stringify(t)); game.message = `👑 Выдан ${itemName} ${nick}`; renderGame(); } else game.message = `❌ Игрок ${nick} не найден`; renderGame(); }
    async function adminGiveEnergy() { if(!game.isAdmin) return; let nick = document.getElementById("aENick")?.value; let amt = parseInt(document.getElementById("aEAmt")?.value); if(!nick) return; let data = await loadData(`rpg_${nick}`); if(data) { let t = JSON.parse(data); t.combatEnergy = Math.min(t.maxCombatEnergy, (t.combatEnergy||0)+amt); await saveData(`rpg_${nick}`, JSON.stringify(t)); game.message = `👑 Выдал ${amt}⚡ ${nick}`; renderGame(); } else game.message = `❌ Игрок ${nick} не найден`; renderGame(); }
    async function adminReset() { if(!game.isAdmin) return; let nick = document.getElementById("aRNick")?.value; if(!nick) return; if(confirm(`Сбросить ${nick}?`)) { await deleteData(`rpg_${nick}`); game.message = `👑 Сброшен ${nick}`; renderGame(); } }
    function toggleAdmin() { document.getElementById("adminPanel")?.classList.toggle("show"); }
    
    function renderGame() {
        const container = document.getElementById("rpgGame");
        const stats = getCurrentStats();
        const cls = CLASSES[game.class] || CLASSES.warrior;
        
        if(!game.initialized) {

            document.querySelectorAll(".class-option").forEach(opt => { opt.onclick = () => { document.querySelectorAll(".class-option").forEach(c=>c.classList.remove("selected")); opt.classList.add("selected"); selectedClass = opt.dataset.class; }; });
            document.getElementById("createBtn").onclick = async () => { await createCharacter(document.getElementById("playerName").value, selectedClass); };

        }
        
        let adminHtml = "";

            adminHtml = `<div id="adminPanel" class="admin-panel show"><b>👑 АДМИН-ПАНЕЛЬ</b><hr>
                <b>💰 ЗОЛОТО</b><br><input id="aNick" class="admin-input" placeholder="Ник"><input id="aGold" class="admin-input" value="500"><button onclick="adminGiveGold()">Выдать</button><hr>
                <b>✨ ОПЫТ</b><br><input id="aNick" class="admin-input" placeholder="Ник"><input id="aExp" class="admin-input" value="300"><button onclick="adminGiveExp()">Выдать</button><hr>
                <b>⚡ ЭНЕРГИЯ</b><br><input id="aENick" class="admin-input" placeholder="Ник"><input id="aEAmt" class="admin-input" value="100"><button onclick="adminGiveEnergy()">Выдать</button><hr>

                <hr><button onclick="toggleAdmin()">🔒 СКРЫТЬ</button></div>`;
        }
        
        let locationButtons = Object.entries(LOCATIONS).map(([k,loc]) => {
            let available = canAccessLocation(k);
            let completed = game.completedLocations.includes(k) && !loc.isDungeon;
            let badge = "";
            if(loc.boss && !completed && !loc.isDungeon && k !== "village") badge = `<span style="background:#8b0000; color:gold; padding:2px 6px; border-radius:20px; font-size:0.55rem; margin-left:4px;">👑</span>`;
            if(completed && !loc.isDungeon) badge = `<span style="background:#2a6b4a; color:gold; padding:2px 6px; border-radius:20px; font-size:0.55rem; margin-left:4px;">✅</span>`;
            return `<button class="location-btn ${!available ? 'locked' : ''} ${completed?'completed':''}" onclick="${available ? `changeLocation('${k}')` : ''}" ${!available ? 'disabled' : ''}>${loc.icon} ${loc.name} ${badge}</button>`;
        }).join('');
        
        let fightBlock = "";
        if(game.inCombat && game.combatEnemy) {
            fightBlock = `<div style="background:#2a1e2e; border-radius:20px; padding:12px; margin:12px 0;"><div style="font-size:1.2rem;">${game.combatEnemy.icon} ${game.combatEnemy.name}</div><div>❤️ ${Math.max(0,Math.floor(game.enemyCurrentHp))}/${game.combatEnemy.hp}</div><div>⚔️ ${game.combatEnemy.str}</div><div style="display:flex; gap:10px;"><button id="attackBtn" style="flex:1; background:#8b3c2c;">⚔️ АТАКОВАТЬ</button></div></div>`;
        }
        
        let dungeonControls = "";
        if(game.location === "dungeonLoc") {
            dungeonControls = `<div style="margin: 10px 0;"><input id="floorInput" type="number" min="1" max="1000" value="${game.dungeonFloor}" style="background:#1e1b2b; color:#f7d44a; border:1px solid gold; border-radius:20px; padding:5px; width:80px; text-align:center;"><button onclick="goToFloor(parseInt(document.getElementById('floorInput').value))">⬇️ Перейти на этаж</button><button id="exitDungeonBtn" class="exit-dungeon-btn" style="background:#ff6600;">🚪 Выйти из подземелья</button></div>`;

            <div class="stats-panel"><span class="stat">❤️ ${Math.floor(stats.hp)}/${stats.maxHp}</span><span class="stat">⚔️ ${stats.str}</span><span class="stat">⭐${game.level}</span><span class="stat">💰${game.gold}</span><span class="stat">${cls.icon} ${cls.name}</span></div>

            <div><span>🚶 Энергия пути: ${game.travelEnergy}/${game.maxTravelEnergy}</span><div class="energy-bar"><div class="energy-fill travel" style="width:${(game.travelEnergy/game.maxTravelEnergy)*100}%"></div></div></div>
            <div class="fight-counter">🏆 ПОБЕД: ${game.monstersKilled}/${game.needToKill}</div>
            <div style="display:flex; gap:6px;"><button id="fightBtn" style="flex:1;">⚔️ БОЙ</button><button id="autoBtn" class="autofight-btn ${game.autoFightActive?'active':''}" style="flex:1;">${game.autoFightActive?'🟢 АВТО':'🔴 АВТО'}</button><button id="bossBtn" style="flex:1;" class="boss-btn">👑 БОСС</button></div>
            ${dungeonControls}
            <div class="location-grid">${locationButtons}</div>
            ${fightBlock}
            <div class="message-log">💬 ${game.message}</div>
            <button id="resetBtn" class="reset-btn">🔄 СБРОС ПЕРСОНАЖА</button>
            </div>`;
        
        let inventoryTab = `<div id="tab-inventory" class="tab-content ${game.activeTab==='inventory'?'active':''}">
            <div class="equipment-grid"><div class="equip-item"><b>⚔️ ${game.weapon?.name}</b><br>+${game.weapon?.strBonus} силы</div><div class="equip-item"><b>🛡️ ${game.armor?.name}</b><br>+${game.armor?.defBonus} защиты</div></div>
            <div class="section-title">💊 ЗЕЛЬЯ</div><div style="display:flex; gap:8px; flex-wrap:wrap;"><div><span>🍃 Слабое x${game.potions.weak}</span><button onclick="usePotion('weak')">Исп</button></div><div><span>🧪 Среднее x${game.potions.medium}</span><button onclick="usePotion('medium')">Исп</button></div><div><span>💊 Сильное x${game.potions.strong}</span><button onclick="usePotion('strong')">Исп</button></div></div>
            <div class="section-title">📦 ПРЕДМЕТЫ (нажмите для экипировки)</div><div class="items-grid">${game.inventory.map(i => `<div class="item-card" onclick="equipItem(${JSON.stringify(i).replace(/"/g,'&quot;')})">${i.type==="weapon"?"⚔️":"🛡️"} ${i.name}<br>+${i.strBonus||i.defBonus}</div>`).join('')}</div>
            <div class="section-title">📦 РЕСУРСЫ</div><div class="resource-row">${Object.entries(game.resources || {}).map(([k,v]) => `<span class="resource-badge">📀 ${k}: ${v}</span>`).join('') || "Нет ресурсов"}</div>
            </div>`;
        
        let adminTab = `<div id="tab-admin" class="tab-content ${game.activeTab==='admin'?'active':''}">${adminHtml || "<p>Вы не администратор</p>"}</div>`;
        
        container.innerHTML = tabsHtml + gameTab + inventoryTab + adminTab;
        
        document.getElementById("fightBtn")?.onclick = () => { 
            if(game.autoFightActive) { 
                if(game.autoFightInterval) clearInterval(game.autoFightInterval); 
                game.autoFightActive=false; 
            } 
            if(game.location === "dungeonLoc") startDungeonFight(); 
            else startRandomFight(); 
        };
        document.getElementById("autoBtn")?.onclick = () => startAutoFight();
        document.getElementById("bossBtn")?.onclick = () => { 
            if(game.autoFightActive) { 
                if(game.autoFightInterval) clearInterval(game.autoFightInterval); 
                game.autoFightActive=false; 
            } 
            if(game.location === "dungeonLoc") startDungeonFight(); 
            else startBossFight(); 
        };
        document.getElementById("attackBtn")?.onclick = () => combatAction("attack");
        document.getElementById("resetBtn")?.onclick = async () => { 
            if(confirm("Сбросить персонажа? Все данные будут потеряны!")) { 
                const saveId = game.telegramId ? game.telegramId : game.profileName;
                await deleteData(`rpg_${saveId}`); 
                game.initialized=false; 
                renderGame(); 
            } 
        };
        document.getElementById("exitDungeonBtn")?.onclick = () => exitDungeon();
        document.querySelectorAll(".tab-btn").forEach(b=>{b.onclick=()=>{game.activeTab=b.dataset.tab; renderGame();};});
    }
    
    window.changeLocation = changeLocation;
    window.usePotion = usePotion;
    window.equipItem = equipItem;
    window.adminGiveGold = adminGiveGold;
    window.adminGiveExp = adminGiveExp;
    window.adminGiveItem = adminGiveItem;
    window.adminGiveEnergy = adminGiveEnergy;
    window.adminReset = adminReset;
    window.toggleAdmin = toggleAdmin;
    window.goToFloor = goToFloor;
    window.exitDungeon = exitDungeon;
    
    renderGame();
</script>
</body>
</html>
