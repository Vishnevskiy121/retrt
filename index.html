<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPG | Тропы забытого королевства | МЕГА-ВЕРСИЯ</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0f1a; font-family: system-ui, 'Segoe UI', monospace; margin: 0; padding: 12px; min-height: 100vh; color: #eee; }
        .game-container { max-width: 650px; margin: 0 auto; background: #0f0e17dd; backdrop-filter: blur(3px); border-radius: 36px; padding: 16px; border: 1px solid #f7d44a; box-shadow: 0 10px 30px black; }
        .stat { background: #1e1b2e; padding: 6px 12px; border-radius: 60px; font-size: 0.7rem; font-weight: bold; display: inline-block; margin: 3px; }
        .energy-bar { background: #2a2a3a; border-radius: 20px; height: 8px; margin: 6px 0; overflow: hidden; }
        .energy-fill { background: #4cff4c; width: 0%; height: 100%; transition: width 0.1s; }
        .tab-btn { background: #2a2438; padding: 8px 12px; border-radius: 40px; font-weight: bold; text-align: center; cursor: pointer; flex: 1; }
        .tab-btn.active { background: #f7d44a; color: #1e1b2b; }
        .location-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 12px 0; max-height: 260px; overflow-y: auto; }
        .location-btn { background: #3a2c45; border-radius: 50px; padding: 8px; font-size: 0.7rem; text-align: center; cursor: pointer; }
        .location-btn.locked { opacity: 0.4; cursor: not-allowed; }
        .location-btn.completed { background: #2a6b4a; border: 1px solid gold; }
        .item-card { background: #2a2438; padding: 8px; border-radius: 16px; font-size: 0.7rem; margin: 4px; cursor: pointer; text-align: center; }
        .button-group { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        button { background: #3a2c45; border: none; padding: 10px 14px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; transition: 0.05s linear; }
        button:active { transform: scale(0.96); }
        .admin-only { border: 2px solid #ff4444; background: #2a1515; }
        .class-selector { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin: 12px 0; max-height: 340px; overflow-y: auto; }
        .class-option { background: #2a2438; padding: 10px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid #f7d44a; }
        .class-option.selected { background: #f7d44a; color: #1e1b2b; }
        .shop-item { background: #1e3a2a; padding: 8px 12px; border-radius: 20px; margin: 6px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; font-size: 0.75rem; }
        .enemy-evolved { border: 2px solid #ff8844; box-shadow: 0 0 8px orange; }
        .crit { color: #ffaa33; text-shadow: 0 0 3px orange; }
        .dodge { color: #88ff88; text-shadow: 0 0 3px lime; }
        select, input { background: #1e1b2b; color: #f7d44a; border: 1px solid #f7d44a; border-radius: 30px; padding: 8px 12px; margin: 5px; font-size: 0.8rem; }
        hr { border-color: #f7d44a33; margin: 12px 0; }
        .message-log { background: #000000aa; border-radius: 20px; padding: 10px; font-size: 0.7rem; max-height: 90px; overflow-y: auto; }
        .fight-block { background: #2a1a2a; border-radius: 28px; padding: 14px; text-align: center; margin: 12px 0; }
        .admin-panel { background: #1a1a2a; border-radius: 24px; padding: 12px; margin-top: 12px; border: 1px solid red; }
    </style>
</head>

        fairykingdom:{name:"Королевство фей",icon:"🧚",levelReq:240,energyCost:11,boss:{name:"Королева фей",hp:9450,str:1085,exp:17850,gold:23050,icon:"✨"}},
        shadowrealm:{name:"Царство теней",icon:"🌑",levelReq:250,energyCost:11,boss:{name:"Властелин теней",hp:10650,str:1195,exp:19850,gold:25650,icon:"🌙"}},

    };

    // ██████████████████████████████████████████████████████████████████████████
    // 3. 40+ МОНСТРОВ С ЭВОЛЮЦИЕЙ
    // ██████████████████████████████████████████████████████████████████████████
    const MONSTERS_BASE = [
        {name:"Гоблин",hp:28,str:9,exp:35,gold:22,icon:"👺",evolveLv:15,evolvedName:"Гоблин-шаман",evolveBonus:1.6},
        {name:"Волк",hp:34,str:12,exp:50,gold:28,icon:"🐺",evolveLv:20,evolvedName:"Вожак волков",evolveBonus:1.7},
        {name:"Орк",hp:48,str:17,exp:85,gold:45,icon:"👹",evolveLv:30,evolvedName:"Орк-генерал",evolveBonus:1.8},
        {name:"Скелет",hp:40,str:14,exp:70,gold:34,icon:"💀",evolveLv:25,evolvedName:"Рыцарь смерти",evolveBonus:1.7},
        {name:"Тролль",hp:65,str:20,exp:130,gold:70,icon:"🗿",evolveLv:35,evolvedName:"Горный тролль",evolveBonus:1.9},
        {name:"Гарпия",hp:52,str:18,exp:100,gold:55,icon:"🦅",evolveLv:28,evolvedName:"Королева гарпий",evolveBonus:1.75},
        {name:"Минотавр",hp:90,str:26,exp:190,gold:100,icon:"🐂",evolveLv:45,evolvedName:"Минотавр-разрушитель",evolveBonus:2.0},
        {name:"Василиск",hp:78,str:24,exp:170,gold:90,icon:"🐍",evolveLv:40,evolvedName:"Василиск древний",evolveBonus:1.95},
        {name:"Химера",hp:110,str:32,exp:250,gold:135,icon:"🦁",evolveLv:55,evolvedName:"Химера ужаса",evolveBonus:2.1},
        {name:"Циклоп",hp:130,str:36,exp:300,gold:160,icon:"👁️",evolveLv:60,evolvedName:"Циклоп-титан",evolveBonus:2.2},
        {name:"Дракон",hp:200,str:50,exp:500,gold:280,icon:"🐉",evolveLv:80,evolvedName:"Древний дракон",evolveBonus:2.5},
        {name:"Лич",hp:170,str:44,exp:440,gold:240,icon:"💀",evolveLv:75,evolvedName:"Архилич",evolveBonus:2.4},
        {name:"Демон",hp:190,str:48,exp:480,gold:260,icon:"👹",evolveLv:85,evolvedName:"Князь демонов",evolveBonus:2.6},
        {name:"Элементаль",hp:140,str:38,exp:340,gold:185,icon:"🌊",evolveLv:65,evolvedName:"Великий элементаль",evolveBonus:2.2},
        {name:"Голем",hp:160,str:42,exp:400,gold:215,icon:"🪨",evolveLv:70,evolvedName:"Голем-хранитель",evolveBonus:2.3}
    ];
    for(let i=0;i<10;i++) MONSTERS_BASE.push({name:"Тень",hp:45+Math.floor(i*2),str:12+Math.floor(i),exp:80+i*8,gold:45+i*5,icon:"🌑",evolveLv:50,evolvedName:"Теневой ужас",evolveBonus:1.9});
    // всего ~45 монстров

    // ██████████████████████████████████████████████████████████████████████████
    // 4. ОРУЖИЕ 100+ и БРОНЯ 100+
    // ██████████████████████████████████████████████████████████████████████████
    let WEAPONS = [];
    let ARMORS = [];
    for(let i=1;i<=60;i++) WEAPONS.push({name:`Стальной меч +${i}`,type:"weapon",strBonus:8+i*2,price:500+i*80,legendary:false,mythic:false,floorReq:1,levelReq:1});
    for(let i=1;i<=40;i++) WEAPONS.push({name:`Мифриловый клинок +${i}`,type:"weapon",strBonus:30+i*5,price:5000+i*300,legendary:i>=25,mythic:false,floorReq:80,levelReq:40});
    for(let i=1;i<=20;i++) WEAPONS.push({name:`Легендарное оружие ⭐`,type:"weapon",strBonus:120+i*8,price:380000,legendary:true,mythic:false,floorReq:100,levelReq:60});
    for(let i=1;i<=10;i++) WEAPONS.push({name:`Мифический артефакт ✨`,type:"weapon",strBonus:250+i*15,price:1500000,legendary:false,mythic:true,floorReq:300,levelReq:70});
    for(let i=1;i<=60;i++) ARMORS.push({name:`Кожаный доспех +${i}`,type:"armor",defBonus:5+Math.floor(i*1.5),price:450+i*70,legendary:false,floorReq:1});
    for(let i=1;i<=40;i++) ARMORS.push({name:`Латы +${i}`,type:"armor",defBonus:28+i*4,price:4500+i*250,legendary:i>=25,floorReq:80});
    for(let i=1;i<=20;i++) ARMORS.push({name:`Легендарная броня 🛡️`,type:"armor",defBonus:100+i*7,price:360000,legendary:true,floorReq:100});
    for(let i=1;i<=10;i++) ARMORS.push({name:`Мифическая броня 🏆`,type:"armor",defBonus:220+i*12,price:1450000,legendary:false,mythic:true,floorReq:300});

    // ресурсы 30 видов
    const RESOURCES = ["Целебная трава","Магический гриб","Мифический цветок","Корень мудрости","Лист вампира","Ягода дракона","Цветок феникса","Трава бессмертия","Мох духов","Эльфийский лист","Медная руда","Железная руда","Серебряная руда","Золотая руда","Мифриловая руда","Осколок небес","Теневой кристалл","Огненный самоцвет","Ледяной камень","Камень душ","Малая эссенция","Средняя эссенция","Великая эссенция","Искра богов","Шёлковая нить","Магическая ткань","Чешуя дракона","Кость великана","Перо феникса","Сердце демона"];
    
    let game = {
        initialized:false, profileName:"", class:"warrior", gold:5000, level:1, exp:0, expToNext:100, hp:100, maxHp:100,
        travelEnergy:50, maxTravelEnergy:50, weapon:null, armor:null, inventory:[], resources:{}, message:"Добро пожаловать!",
        inCombat:false, combatEnemy:null, enemyCurrentHp:0, location:"village", dungeonFloor:1, maxUnlockedFloor:1,
        completedLocations:[], monstersKilled:0, needToKill:12, autoFightActive:false, autoFightInterval:null, activeTab:"game",
        infiniteBattleEnergy:false, infiniteTravelEnergy:false, adminMode:false, adminKey:"", lastDropResource:""
    };
    
    function saveGame(){ if(game.profileName) localStorage.setItem("rpg_mega_"+game.profileName, JSON.stringify(game)); }
    function loadGame(name){ let d = localStorage.getItem("rpg_mega_"+name); if(d){ let s=JSON.parse(d); for(let k in s) game[k]=s[k]; game.message="С возвращением, "+game.profileName+"!"; renderGame(); return true; } return false; }
    
    function getStrength(){ let cls=CLASSES[game.class]; let bonus=12+game.level*2; if(game.weapon) bonus+=game.weapon.strBonus; if(cls) bonus+=cls.strBonus; return bonus; }
    function getDefense(){ let cls=CLASSES[game.class]; let bonus=5+game.level; if(game.armor) bonus+=game.armor.defBonus; if(cls&&cls.defBonus) bonus+=cls.defBonus; return Math.max(2,bonus); }
    function getCritChance(){ let cls=CLASSES[game.class]; let base=5; if(cls) base+=cls.crit; if(game.weapon&&game.weapon.strBonus>100) base+=12; return Math.min(65,base); }
    function getDodgeChance(){ let cls=CLASSES[game.class]; let base=3; if(cls) base+=cls.dodge; if(game.armor&&game.armor.defBonus>80) base+=10; return Math.min(55,base); }
    
    function getRandomEnemy(){
        let base = JSON.parse(JSON.stringify(MONSTERS_BASE[Math.floor(Math.random()*MONSTERS_BASE.length)]));
        let bonus = Math.floor(game.level/4);
        let isEvolved = (game.level>=base.evolveLv && game.dungeonFloor>50);
        if(isEvolved){ base.name=base.evolvedName; base.hp=Math.floor(base.hp*base.evolveBonus); base.str=Math.floor(base.str*base.evolveBonus); base.exp=Math.floor(base.exp*1.6); base.gold=Math.floor(base.gold*1.5); }
        base.hp += bonus*12; base.str += Math.floor(bonus*2.5); base.exp += bonus*18; base.gold += bonus*15;
        return base;
    }
    function getBoss(){
        let loc=LOCATIONS[game.location]; if(!loc.boss) return null;
        let boss=JSON.parse(JSON.stringify(loc.boss)); let bonus=Math.floor(game.level/3);
        boss.hp+=bonus*25; boss.str+=Math.floor(bonus*4); boss.exp+=bonus*45; boss.gold+=bonus*80; boss.isBoss=true;
        return boss;
    }
    
    function addExp(amt){
        game.exp+=amt; game.message+=" +"+amt+" ✨";
        while(game.exp>=game.expToNext){
            game.exp-=game.expToNext; game.level++; game.maxHp+=12; game.hp=game.maxHp;
            game.maxTravelEnergy+=2; game.travelEnergy=game.maxTravelEnergy;
            game.expToNext=Math.floor(game.expToNext*1.18);
            game.message+=` 🎉 УРОВЕНЬ ${game.level}! 🎉`;
        }
        saveGame(); renderGame();
    }
    
    function dropResources(isDungeon,floor){
        if(isDungeon && floor>=300 && Math.random()<0.25){ let res = RESOURCES[Math.floor(Math.random()*RESOURCES.length)]; game.resources[res]=(game.resources[res]||0)+Math.floor(Math.random()*2)+1; game.message+=` ✨ Дроп: ${res}!`; }
        let common=Math.random();
        if(isDungeon){
            if(floor>=100 && floor<300 && Math.random()<0.2){ let r=RESOURCES.filter(x=>x.includes("Искра")||x.includes("Мифрил")); if(r.length){ game.resources[r[0]]=(game.resources[r[0]]||0)+1; game.message+=` 🔥 Легендарный ресурс: ${r[0]}!`; } }
            if(floor>=300 && Math.random()<0.2){ let r=RESOURCES.filter(x=>x.includes("Сердце")||x.includes("Искра")); if(r.length){ game.resources[r[0]]=(game.resources[r[0]]||0)+1; game.message+=` 💎 Мифический ресурс: ${r[0]}!`; } }
            if(Math.random()<0.5){ let r=RESOURCES[Math.floor(Math.random()*RESOURCES.length)]; game.resources[r]=(game.resources[r]||0)+Math.floor(Math.random()*2)+1; game.message+=` 📦 +${r}`; }
        } else if(Math.random()<0.2){ let r=RESOURCES.slice(0,20)[Math.floor(Math.random()*20)]; game.resources[r]=(game.resources[r]||0)+1; game.message+=` 🌿 +${r}`; }
        saveGame();
    }
    
    function attack(){
        if(!game.inCombat) return;
        let enemy=game.combatEnemy; let strength=getStrength(); let dodgeChance=getDodgeChance();
        if(Math.random()*100<dodgeChance){ game.message=`🌀 УВОРОТ! Вы избежали атаки врага!`; renderGame(); return; }
        let critChance=getCritChance(); let isCrit=Math.random()*100<critChance;
        let damage=Math.max(6, strength+Math.floor(Math.random()*20)-5); if(isCrit){ damage=Math.floor(damage*1.8); game.message+=` 💥 КРИТИЧЕСКИЙ УДАР!`; }
        game.enemyCurrentHp-=damage; game.message=`⚔️ Урон ${damage} по ${enemy.name}!`;
        if(game.enemyCurrentHp<=0){
            let energyBack=8; if(enemy.isBoss) energyBack=20; if(!game.infiniteTravelEnergy) game.travelEnergy=Math.min(game.maxTravelEnergy,game.travelEnergy+energyBack);
            game.gold+=enemy.gold; addExp(enemy.exp); if(!enemy.isBoss) game.monstersKilled++; else game.monstersKilled=0;
            game.hp=Math.min(game.maxHp,game.hp+(enemy.isBoss?25:10)); game.message+=` 🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            if(enemy.isBoss && game.completedLocations.indexOf(game.location)===-1 && game.location!=="dungeon"){ game.completedLocations.push(game.location); game.message+=` 🎉 Локация пройдена!`; }
            if(game.location==="dungeon"){ game.dungeonFloor++; if(game.dungeonFloor>game.maxUnlockedFloor) game.maxUnlockedFloor=game.dungeonFloor; game.message+=` 📈 Этаж ${game.dungeonFloor}!`; dropResources(true,game.dungeonFloor); }
            else dropResources(false);
            game.inCombat=false; game.combatEnemy=null; saveGame(); renderGame();
            if(game.autoFightActive && !enemy.isBoss) setTimeout(()=>startFight(),300);
            return;
        }
        let playerDef=getDefense(); let enemyDamage=Math.max(4, enemy.str+Math.floor(Math.random()*12)-playerDef);
        game.hp-=enemyDamage; game.message+=` 😡 ${enemy.name} нанёс ${enemyDamage} урона!`;
        if(game.hp<=0){ game.hp=Math.floor(game.maxHp*0.5); game.message=` 💀 Вы погибли! Восстановлено 50% HP.`; game.inCombat=false; game.combatEnemy=null; if(game.autoFightActive) game.autoFightActive=false; saveGame(); renderGame(); return; }
        saveGame(); renderGame();
    }
    
    function startFight(){
        if(game.hp<15){ game.message="❌ Мало HP, восстановитесь!"; renderGame(); return; }
        if(game.location!=="dungeon" && game.completedLocations.indexOf(game.location)!==-1 && game.monstersKilled>=game.needToKill){ game.message="🏆 Босс уже побеждён!"; renderGame(); return; }
        let enemy=(game.location==="dungeon") ? (game.dungeonFloor%10===0 ? getBoss() : getRandomEnemy()) : (game.monstersKilled>=game.needToKill ? getBoss() : getRandomEnemy());
        if(!enemy){ game.message="❌ Нет врага"; renderGame(); return; }
        game.inCombat=true; game.combatEnemy=enemy; game.enemyCurrentHp=enemy.hp; game.message=`⚔️ БОЙ! ${enemy.icon} ${enemy.name} ⚔️`; renderGame();
    }
    
    function startAutoFight(){ if(game.autoFightActive){ if(game.autoFightInterval) clearInterval(game.autoFightInterval); game.autoFightActive=false; game.message="🔴 АВТОБОЙ ВЫКЛ"; renderGame(); return; } game.autoFightActive=true; game.message="🟢 АВТОБОЙ ВКЛ"; renderGame(); game.autoFightInterval=setInterval(()=>{ if(game.autoFightActive && !game.inCombat && game.hp>15) startFight(); else if(game.autoFightActive && game.inCombat) attack(); },800); }
    
    function changeLocation(key){
        let loc=LOCATIONS[key]; if(!loc) return; if(game.level<loc.levelReq){ game.message=`❌ Нужен ${loc.levelReq} уровень!`; renderGame(); return; }
        let energyCost=loc.energyCost; if(!game.infiniteTravelEnergy && game.travelEnergy<energyCost){ game.message=`❌ Нужно ${energyCost} энергии!`; renderGame(); return; }
        if(!game.infiniteTravelEnergy) game.travelEnergy-=energyCost;
        game.location=key; game.monstersKilled=(game.completedLocations.indexOf(key)!==-1 && key!=="dungeon")?game.needToKill:0;
        game.message=`🚶 Переход в ${loc.name}`; saveGame(); renderGame();
    }
    
    function createCharacter(name,cls){
        if(!name.trim()) return; let c=CLASSES[cls]; game.profileName=name; game.class=cls; game.gold=5000; game.level=1; game.exp=0; game.expToNext=100;
        game.maxHp=95+(c.hpBonus||0); game.hp=game.maxHp; game.travelEnergy=55; game.maxTravelEnergy=55; game.monstersKilled=0; game.dungeonFloor=1; game.maxUnlockedFloor=1;
        game.completedLocations=[]; game.resources={}; for(let r of RESOURCES) game.resources[r]=Math.floor(Math.random()*5);
        game.weapon={name:c.weapon,type:"weapon",strBonus:c.strBonus,price:0}; game.armor={name:"Кожаная броня",type:"armor",defBonus:3};
        game.inventory=[game.weapon,game.armor]; game.message=`✨ Добро пожаловать, ${name} ${c.name}!`; game.initialized=true; saveGame(); renderGame();
    }
    
    function equipItem(it){ if(it.type==="weapon") game.weapon=it; else if(it.type==="armor") game.armor=it; game.message=`🔧 Экипировано: ${it.name}`; saveGame(); renderGame(); }
    function usePotion(){ if(game.gold<80){ game.message="💰 Нужно 80 золота!"; renderGame(); return; } game.gold-=80; game.hp=Math.min(game.maxHp,game.hp+45); game.message="🧪 +45 HP"; saveGame(); renderGame(); }
    function restoreEnergy(){ if(game.gold<70){ game.message="💰 Нужно 70 золота!"; return; } game.gold-=70; game.travelEnergy=game.maxTravelEnergy; game.message="⚡ Энергия восстановлена!"; saveGame(); renderGame(); }
    function resetGame(){ if(confirm("Сбросить?")){ if(game.profileName) localStorage.removeItem("rpg_mega_"+game.profileName); game.initialized=false; renderGame(); } }
    function exitDungeon(){ game.location="village"; game.message="🏡 Вышли из подземелья"; saveGame(); renderGame(); }
    function setAdminMode(pass){ if(pass==="admin123"){ game.adminMode=true; game.message="🔐 Админ-режим активирован!"; renderGame(); } }
    
    function adminCommand(){
        let nick=document.getElementById("adminNick")?.value; let type=document.getElementById("adminType")?.value; let val=parseInt(document.getElementById("adminVal")?.value);
        if(!nick || isNaN(val)) return;
        let data=localStorage.getItem("rpg_mega_"+nick); if(!data){ alert("Персонаж не найден"); return; }
        let target=JSON.parse(data);
        if(type==="gold") target.gold+=val;
        if(type==="exp") target.exp+=val;
        if(type==="energy") target.travelEnergy=Math.min(target.maxTravelEnergy, target.travelEnergy+val);
        if(type==="res"){ let res=document.getElementById("adminRes")?.value; if(res) target.resources[res]=(target.resources[res]||0)+val; }
        if(type==="weapon"){ let w=WEAPONS.find(w=>w.name===document.getElementById("adminWeapon")?.value); if(w) target.inventory.push(w); }
        if(type==="armor"){ let a=ARMORS.find(a=>a.name===document.getElementById("adminArmor")?.value); if(a) target.inventory.push(a); }
        localStorage.setItem("rpg_mega_"+nick,JSON.stringify(target)); alert("Выдано!");
        if(nick===game.profileName) loadGame(nick);
    }
    
    function craftItem(kind,itemName){ /* упрощённо */ game.message="Крафт в разработке"; renderGame(); }
    
    function renderGame(){
        let container=document.getElementById("rpgGame"); if(!container) return;
        if(!game.initialized){
            let selected="warrior"; let clsHtml=`<div class="class-selector" id="classSel">`+Object.keys(CLASSES).map(k=>`<div class="class-option ${selected===k?'selected':''}" data-class="${k}">${CLASSES[k].icon} ${CLASSES[k].name}<br>+${CLASSES[k].strBonus}⚔️ +${CLASSES[k].crit}% крит</div>`).join('')+`</div><input id="pname" placeholder="Имя героя"><button id="createBtn" style="background:#f7d44a;">🚀 НАЧАТЬ</button><hr><div><input id="adminPass" placeholder="Пароль админа"><button id="adminLogin">Войти админом</button></div>`;
            container.innerHTML=clsHtml; document.getElementById("createBtn").onclick=()=>createCharacter(document.getElementById("pname").value,selected); document.getElementById("adminLogin").onclick=()=>setAdminMode(document.getElementById("adminPass").value);
            document.querySelectorAll(".class-option").forEach(el=>{ el.onclick=function(){ document.querySelectorAll(".class-option").forEach(c=>c.classList.remove("selected")); this.classList.add("selected"); selected=this.dataset.class; }; });
            return;
        }
        let cls=CLASSES[game.class], hpPerc=game.hp/game.maxHp*100, travPerc=game.travelEnergy/game.maxTravelEnergy*100;
        let locsHtml=Object.keys(LOCATIONS).map(k=>{let l=LOCATIONS[k]; let locked=game.level<l.levelReq; return `<button class="location-btn ${locked?'locked':''} ${game.completedLocations.includes(k)?'completed':''}" onclick="changeLocation('${k}')" ${locked?'disabled':''}>${l.icon} ${l.name} (ур.${l.levelReq})</button>`;}).join('');
        let fightBlock=game.inCombat?`<div class="fight-block"><div>${game.combatEnemy.icon} ${game.combatEnemy.name}</div><div>❤️ ${Math.max(0,game.enemyCurrentHp)}/${game.combatEnemy.hp}</div><button id="attackBtn" style="background:#8b3c2c;">⚔️ АТАКОВАТЬ</button></div>`:'';
        let adminBlock=game.adminMode?`<div class="admin-panel"><b>👑 АДМИН ПАНЕЛЬ</b><br><input id="adminNick" placeholder="Ник"><select id="adminType"><option value="gold">💰 Золото</option><option value="exp">✨ Опыт</option><option value="energy">⚡ Энергия</option><option value="res">📦 Ресурс</option><option value="weapon">⚔️ Оружие</option><option value="armor">🛡️ Броня</option></select><input id="adminVal" placeholder="Кол-во"><select id="adminRes">${RESOURCES.map(r=>`<option>${r}</option>`).join('')}</select><select id="adminWeapon">${WEAPONS.slice(0,20).map(w=>`<option>${w.name}</option>`).join('')}</select><select id="adminArmor">${ARMORS.slice(0,20).map(a=>`<option>${a.name}</option>`).join('')}</select><button onclick="adminCommand()">Выдать</button><button onclick="game.infiniteBattleEnergy=!game.infiniteBattleEnergy; renderGame();">♾️ Боевая беск.: ${game.infiniteBattleEnergy?"✅":"❌"}</button><button onclick="game.infiniteTravelEnergy=!game.infiniteTravelEnergy; renderGame();">🚶 Путь беск.: ${game.infiniteTravelEnergy?"✅":"❌"}</button></div>`:'';
        let shopHtml=`<div><b>⚔️ МАГАЗИН КУЗНЕЦА</b></div>`+WEAPONS.slice(0,30).map(w=>`<div class="shop-item">${w.name} +${w.strBonus} силы <button onclick="if(game.gold>=${w.price}){game.gold-=${w.price}; equipItem({name:'${w.name}',type:'weapon',strBonus:${w.strBonus}}); renderGame();}else alert('Мало золота')">${w.price}💰</button></div>`).join('');
        let armorShop=ARMORS.slice(0,30).map(a=>`<div class="shop-item">${a.name} +${a.defBonus} защиты <button onclick="if(game.gold>=${a.price}){game.gold-=${a.price}; equipItem({name:'${a.name}',type:'armor',defBonus:${a.defBonus}}); renderGame();}else alert('Нет золота')">${a.price}💰</button></div>`).join('');
        let invHtml=game.inventory.map(it=>`<div class="item-card" onclick="equipItem(${JSON.stringify(it).replace(/"/g,'&quot;')})">${it.type==="weapon"?"⚔️":"🛡️"} ${it.name} +${it.strBonus||it.defBonus}</div>`).join('');
        let resHtml=Object.keys(game.resources).map(r=>`${r}: ${game.resources[r]}`).slice(0,20).join(' | ');
        container.innerHTML=`<div class="tabs"><div class="tab-btn ${game.activeTab==='game'?'active':''}" data-tab="game">⚔️ БОЙ</div><div class="tab-btn ${game.activeTab==='inventory'?'active':''}" data-tab="inventory">📦 ИНВЕНТАРЬ</div><div class="tab-btn ${game.activeTab==='shop'?'active':''}" data-tab="shop">🏪 МАГАЗИН</div><div class="tab-btn ${game.activeTab==='admin'?'active':''}" data-tab="admin">👑 АДМИН</div></div>
        <div id="tab-game" class="tab-content ${game.activeTab==='game'?'active':''}"><div class="sprite-area">${cls.icon}</div><div class="stats-panel">${['❤️ '+Math.floor(game.hp)+'/'+game.maxHp,'⚔️ '+getStrength(),'🛡️ '+getDefense(),`⭐ Ур.${game.level}`,`💰 ${game.gold}`,`✨ ${game.exp}/${game.expToNext}`].map(s=>`<span class="stat">${s}</span>`).join('')}</div><div>❤️ ЗДОРОВЬЕ</div><div class="energy-bar"><div class="energy-fill" style="width:${hpPerc}%; background:#ff4444;"></div></div><div>🚶 ЭНЕРГИЯ ПУТИ</div><div class="energy-bar"><div class="energy-fill travel" style="width:${travPerc}%;"></div></div><div class="fight-counter">🏆 УБИТО: ${game.monstersKilled}/${game.needToKill} ${game.monstersKilled>=game.needToKill?'👑 БОСС ДОСТУПЕН':''}</div><div class="button-group"><button id="fightBtn">⚔️ БОЙ</button><button id="autoBtn" class="${game.autoFightActive?'active':''}">${game.autoFightActive?'🟢 АВТО':'🔴 АВТО'}</button><button id="potionBtn">🧪 ЗЕЛЬЕ (80💰)</button><button id="energyBtn">⚡ ВОССТ (70💰)</button></div><div class="location-grid">${locsHtml}</div>${fightBlock}<div class="message-log">💬 ${game.message}</div><button id="resetBtn" style="width:100%; margin-top:8px;">🔄 СБРОСИТЬ</button></div>
        <div id="tab-inventory" class="tab-content ${game.activeTab==='inventory'?'active':''}"><div><b>⚔️ ОРУЖИЕ:</b> ${game.weapon?.name||"нет"} +${game.weapon?.strBonus||0}<br><b>🛡️ БРОНЯ:</b> ${game.armor?.name||"нет"} +${game.armor?.defBonus||0}</div><hr><div><b>📦 ИНВЕНТАРЬ:</b></div><div class="items-grid">${invHtml}</div><hr><div><b>🌿 РЕСУРСЫ:</b><br>${resHtml}</div></div>
        <div id="tab-shop" class="tab-content ${game.activeTab==='shop'?'active':''}"><b>🏪 КУЗНЕЦ (оружие)</b>${shopHtml}<hr><b>🛡️ БРОНЯ</b>${armorShop}</div>
        <div id="tab-admin" class="tab-content ${game.activeTab==='admin'?'active':''}">${adminBlock}</div>`;
        document.getElementById("fightBtn")?.addEventListener("click",()=>startFight()); document.getElementById("autoBtn")?.addEventListener("click",()=>startAutoFight()); document.getElementById("potionBtn")?.addEventListener("click",()=>usePotion()); document.getElementById("energyBtn")?.addEventListener("click",()=>restoreEnergy()); document.getElementById("attackBtn")?.addEventListener("click",()=>attack()); document.getElementById("resetBtn")?.addEventListener("click",()=>resetGame());
        document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",function(){ game.activeTab=this.dataset.tab; renderGame(); }));
    }
    window.changeLocation=changeLocation; window.equipItem=equipItem; window.adminCommand=adminCommand; window.exitDungeon=exitDungeon;
    renderGame();
</script>
</body>
</html>
